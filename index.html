<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Catholic Campus Ministry</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f1e8;
      color: #2c2416;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    main { text-align: center; max-width: 36rem; }
    .mark {
      font-family: Georgia, serif;
      font-size: 4rem;
      color: #8b1a1a;
      line-height: 1;
      margin-bottom: 1.5rem;
    }
    h1 {
      font-family: Georgia, serif;
      font-size: 2.25rem;
      font-weight: 400;
      margin-bottom: 1rem;
      letter-spacing: -0.02em;
    }
    p { color: #5c5040; font-size: 1.125rem; line-height: 1.6; }
    .footer {
      margin-top: 3rem;
      font-size: 0.875rem;
      color: #9a8b73;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
  <main>
    <div class="mark">&dagger;</div>
    <h1>Catholic Campus Ministry</h1>
    <p>A new home for our campus community is on the way.</p>
    <p class="footer">ccm.pinnacledatascience.com</p>
